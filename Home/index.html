    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('Assets/BG.jpg'); 
            background-size: cover;
            background-position: center;
            font-family: Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .button-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
        }

        .button-wrapper {
            position: relative;
            margin: 10px;
        }

        .button {
            width: 210px;
            height: 210px;
            border: 0px solid black;
            border-radius: 15px;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            transition: all 0.2s ease;
        }

        .button:hover {
            transform: scale(1.2);
        }

        .label {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: white;
            transition: opacity 0.3s ease;
            font-family: 'Roboto', sans-serif; /* Default font for all labels */
        }

        .button-wrapper:hover .label {
            opacity: 1;
        }

        #button1 {
